<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>COMUSCS Check-in v2 - Confirmação</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{font-family:Arial;background:#f5f7fa;margin:0;padding:20px}
.card{background:#fff;padding:20px;border-radius:12px;max-width:600px;margin:auto}
input,button{padding:12px;margin-top:10px;width:100%}
button{cursor:pointer}
.ok{background:#dcfce7}
.erro{background:#fee2e2}
</style>
</head>

<body>

<div class="card">
<h2>Busca de inscrito</h2>

<input id="inputBusca" placeholder="CPF / RA / ID">

<button id="btnBuscar">Buscar</button>

<div id="preview" style="margin-top:20px;display:none;border:1px solid #ccc;padding:15px;border-radius:10px">
<h3>Confirmar dados</h3>
<p id="nome"></p>
<p id="cpf"></p>
<p id="ra"></p>

<button id="btnConfirmar">Confirmar ação</button>
<button id="btnCancelar">Cancelar</button>
</div>

<div id="status" style="margin-top:15px;"></div>

</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyXXXX",
  authDomain: "checkin-comuscs.firebaseapp.com",
  projectId: "checkin-comuscs"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let pessoaSelecionada = null;

function normalizar(v){
  return String(v||"").replace(/[.\-\/ ]/g,"").toUpperCase()
}

document.getElementById("btnBuscar").onclick = async ()=>{

  const termo = normalizar(document.getElementById("inputBusca").value);

  const snapshot = await db.collection("inscritos_comuscs").get();

  let encontrado = null;

  snapshot.forEach(doc=>{
    const d = doc.data();
    if(
      termo === normalizar(d.id) ||
      termo === normalizar(d.cpf) ||
      termo === normalizar(d.ra)
    ){
      encontrado = {id:doc.id,...d}
    }
  });

  if(!encontrado){
    document.getElementById("status").innerHTML="Não encontrado";
    return;
  }

  pessoaSelecionada = encontrado;

  document.getElementById("nome").innerText="Nome: "+(encontrado.nome||"-");
  document.getElementById("cpf").innerText="CPF: "+(encontrado.cpf||"-");
  document.getElementById("ra").innerText="RA: "+(encontrado.ra||"-");

  document.getElementById("preview").style.display="block";
};

document.getElementById("btnConfirmar").onclick = async ()=>{

  if(!pessoaSelecionada) return;

  await db.collection("inscritos_comuscs").doc(pessoaSelecionada.id).set({
    confirmado:true,
    atualizadoEm:new Date()
  },{merge:true});

  document.getElementById("status").innerHTML="Confirmado com sucesso";
  document.getElementById("preview").style.display="none";
  document.getElementById("inputBusca").value="";
};

document.getElementById("btnCancelar").onclick = ()=>{
  pessoaSelecionada=null;
  document.getElementById("preview").style.display="none";
};

</script>

</body>
</html>
